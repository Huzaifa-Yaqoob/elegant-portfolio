[section]
title = "Pricing"
description = "Rough ranges based on scope. Every project is different, so these give you a ballpark."
badge = "PRICING"

[[items]]
name = "Landing Page"
description = "A single-page or multi-section site for startups, products, or personal brands."
price_range = "$1,500 – $3,500"
icon = "layout"
highlighted = false
features = [
  "Responsive frontend",
  "GSAP / Framer Motion animations",
  "SEO markup & meta",
  "Contact form integration",
  "1 revision round",
]

[[items]]
name = "Web Application"
description = "Full-stack SaaS or internal tool with auth, database, and APIs."
price_range = "$5,000 – $15,000"
icon = "code-2"
highlighted = true
features = [
  "React / Next.js + Node.js backend",
  "Authentication & authorization",
  "Database design & integration",
  "REST / GraphQL API",
  "Admin dashboard",
  "AI-augmented workflows",
  "2 revision rounds",
]

[[items]]
name = "Enterprise / Custom"
description = "Complex systems, microservices, migrations, or ongoing partnership."
price_range = "$15,000+"
icon = "network"
highlighted = false
features = [
  "Custom system architecture",
  "Microservices & containerization",
  "Legacy codebase audit & refactor",
  "CI/CD pipeline setup",
  "Performance optimization",
  "Dedicated Slack channel",
  "Priority support & maintenance",
]

[[items]]
name = "Ongoing maintenance"
description = "Monthly retainer for post-launch support, updates, and new features."
price_range = "$500 – $2,000/mo"
icon = "refresh-cw"
highlighted = false
features = [
  "Bug fixes & hotfixes",
  "Performance monitoring",
  "Security patches & updates",
  "Content updates",
  "Up to 20 hours/month",
  "48-hour response time",
]
